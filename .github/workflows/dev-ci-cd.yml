name: Knotwork Dev CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'core/**'
      - 'libs/**'
      - 'modules/**'
      - 'distributions/**'
      - 'alembic/**'
      - 'alembic.ini'
      - 'pyproject.toml'
      - 'sitecustomize.py'
      - 'Dockerfile.backend'
      - 'Dockerfile.frontend'
      - 'docker-entrypoint.sh'
      - 'docker-compose.yml'
      - 'docker-compose.deploy.yml'
      - '.deploy-images.env.example'
      - '.env.docker.example'
      - 'scripts/**'
      - '.github/workflows/dev-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: knotwork-dev-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.scope.outputs.scope }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "$AFTER")"
          else
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          SCOPE="full"

          if echo "$CHANGED_FILES" | grep -Eq '^core/app-shell/'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^(core/api/|core/mcp/|core/runtime-assembly/|core/runtime_assembly_tasks.py|libs/|modules/|distributions/|alembic/|alembic.ini|pyproject.toml|sitecustomize.py|Dockerfile.backend|Dockerfile.frontend|docker-entrypoint.sh|docker-compose.yml|docker-compose.deploy.yml|\.deploy-images\.env\.example|\.env\.docker\.example|scripts/|\.github/workflows/)'; then
              SCOPE="frontend"
            fi
          fi

          if echo "$CHANGED_FILES" | grep -Eq '^(core/api/|core/mcp/|core/runtime-assembly/|core/runtime_assembly_tasks.py|distributions/|alembic/|alembic.ini)'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^(core/app-shell/|libs/|modules/|distributions/|pyproject.toml|sitecustomize.py|Dockerfile.backend|Dockerfile.frontend|docker-entrypoint.sh|docker-compose.yml|docker-compose.deploy.yml|\.deploy-images\.env\.example|\.env\.docker\.example|scripts/|\.github/workflows/)'; then
              SCOPE="backend"
            fi
          fi

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Resolved scope: $SCOPE"

  build-backend:
    needs: classify
    if: needs.classify.outputs.scope == 'backend' || needs.classify.outputs.scope == 'full'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ghcr.io/crea8r/knotwork-backend:${{ github.sha }}
            ghcr.io/crea8r/knotwork-backend:dev

  build-frontend:
    needs: classify
    if: needs.classify.outputs.scope == 'frontend' || needs.classify.outputs.scope == 'full'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          target: prod
          push: true
          tags: |
            ghcr.io/crea8r/knotwork-frontend:${{ github.sha }}
            ghcr.io/crea8r/knotwork-frontend:dev

  deploy:
    needs:
      - classify
      - build-backend
      - build-frontend
    if: |
      always() &&
      (
        (
          needs.classify.outputs.scope == 'backend' &&
          needs.build-backend.result == 'success' &&
          needs.build-frontend.result == 'skipped'
        ) ||
        (
          needs.classify.outputs.scope == 'frontend' &&
          needs.build-frontend.result == 'success' &&
          needs.build-backend.result == 'skipped'
        ) ||
        (
          needs.classify.outputs.scope == 'full' &&
          needs.build-backend.result == 'success' &&
          needs.build-frontend.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine deploy scope
        id: scope
        shell: bash
        run: |
          echo "scope=${{ needs.classify.outputs.scope }}" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy scope: ${{ needs.classify.outputs.scope }}"

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/dev_server_key
          chmod 600 ~/.ssh/dev_server_key

      - name: Add server to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEV_SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Write deploy image tags on server
        shell: bash
        run: |
          ssh -i ~/.ssh/dev_server_key "${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}" 'bash -s' -- "${{ steps.scope.outputs.scope }}" "${{ github.sha }}" <<'EOF'
          set -euo pipefail
          SCOPE="$1"
          SHA="$2"
          DEPLOY_ENV="/opt/knotwork/.deploy-images.env"

          BACKEND_CURRENT="$(grep '^BACKEND_IMAGE_TAG=' "$DEPLOY_ENV" | cut -d= -f2-)"
          FRONTEND_CURRENT="$(grep '^FRONTEND_IMAGE_TAG=' "$DEPLOY_ENV" | cut -d= -f2-)"

          case "$SCOPE" in
            backend)
              BACKEND_NEW="$SHA"
              FRONTEND_NEW="$FRONTEND_CURRENT"
              ;;
            frontend)
              BACKEND_NEW="$BACKEND_CURRENT"
              FRONTEND_NEW="$SHA"
              ;;
            full)
              BACKEND_NEW="$SHA"
              FRONTEND_NEW="$SHA"
              ;;
            *)
              echo "Invalid scope: $SCOPE" >&2
              exit 1
              ;;
          esac

          printf 'BACKEND_IMAGE_TAG=%s\nFRONTEND_IMAGE_TAG=%s\n' "$BACKEND_NEW" "$FRONTEND_NEW" > "$DEPLOY_ENV"
          EOF

      - name: Log in server to GHCR
        shell: bash
        run: |
          ssh -i ~/.ssh/dev_server_key "${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}" 'bash -s' <<'EOF'
          set -euo pipefail
          printf '%s\n' "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          EOF

      - name: Deploy GHCR images to dev server
        shell: bash
        run: |
          ssh -i ~/.ssh/dev_server_key "${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}" \
            "DEPLOY_SCOPE=${{ steps.scope.outputs.scope }} bash /opt/knotwork/scripts/deploy_dev_server_images.sh"

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: |
          rm -f ~/.ssh/dev_server_key
