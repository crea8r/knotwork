name: Knotwork Dev CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'docker-compose.deploy.yml'
      - 'scripts/**'
      - '.github/workflows/dev-ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: knotwork-dev-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  classify:
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.scope.outputs.scope }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          SCOPE="full"

          if echo "$CHANGED_FILES" | grep -Eq '^(frontend/)'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^(backend/|docker-compose.yml|docker-compose.deploy.yml|scripts/|\.github/workflows/)'; then
              SCOPE="frontend"
            fi
          fi

          if echo "$CHANGED_FILES" | grep -Eq '^(backend/)'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^(frontend/|docker-compose.yml|docker-compose.deploy.yml|scripts/|\.github/workflows/)'; then
              SCOPE="backend"
            fi
          fi

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Resolved scope: $SCOPE"

  build-backend:
    needs: classify
    if: needs.classify.outputs.scope == 'backend' || needs.classify.outputs.scope == 'full'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/crea8r/knotwork-backend:${{ github.sha }}
            ghcr.io/crea8r/knotwork-backend:dev

  build-frontend:
    needs: classify
    if: needs.classify.outputs.scope == 'frontend' || needs.classify.outputs.scope == 'full'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: prod
          push: true
          tags: |
            ghcr.io/crea8r/knotwork-frontend:${{ github.sha }}
            ghcr.io/crea8r/knotwork-frontend:dev

  deploy:
    needs:
      - classify
      - build-backend
      - build-frontend
    if: |
      always() &&
      (
        (needs.classify.outputs.scope == 'backend' && needs.build-backend.result == 'success') ||
        (needs.classify.outputs.scope == 'frontend' && needs.build-frontend.result == 'success') ||
        (needs.classify.outputs.scope == 'full' && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine deploy scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          SCOPE="${{ needs.classify.outputs.scope }}"

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy scope: $SCOPE"

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/dev_server_key
          chmod 600 ~/.ssh/dev_server_key

      - name: Add server to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEV_SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Write deploy image tags on server
        shell: bash
        run: |
          ssh -i ~/.ssh/dev_server_key "${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}" \
            "printf 'BACKEND_IMAGE_TAG=%s\nFRONTEND_IMAGE_TAG=%s\n' '${{ github.sha }}' '${{ github.sha }}' > /opt/knotwork/.deploy-images.env"

      - name: Deploy GHCR images to dev server
        shell: bash
        run: |
          ssh -i ~/.ssh/dev_server_key "${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}" \
            "DEPLOY_SCOPE=${{ steps.scope.outputs.scope }} bash /opt/knotwork/scripts/deploy_dev_server_images.sh"

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: |
          rm -f ~/.ssh/dev_server_key
