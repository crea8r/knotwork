name: Deploy Knotwork Dev

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'docker-compose.deploy.yml'
      - 'scripts/**'
      - '.github/workflows/deploy-dev.yml'
      - '.github/workflows/build-and-publish-dev.yml'
  workflow_dispatch:

concurrency:
  group: knotwork-dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine deploy scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only HEAD^ HEAD)"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          SCOPE="full"

          if echo "$CHANGED_FILES" | grep -Eq '^(frontend/)'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^(backend/|docker-compose.yml|docker-compose.deploy.yml|scripts/|\.github/workflows/)'; then
              SCOPE="frontend"
            fi
          fi

          if echo "$CHANGED_FILES" | grep -Eq '^(backend/)'; then
            if ! echo "$CHANGED_FILES" | grep -Eq '^(frontend/|docker-compose.yml|docker-compose.deploy.yml|scripts/|\.github/workflows/)'; then
              SCOPE="backend"
            fi
          fi

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Resolved deploy scope: $SCOPE"

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEV_SERVER_SSH_KEY }}" > ~/.ssh/dev_server_key
          chmod 600 ~/.ssh/dev_server_key

      - name: Add server to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEV_SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy GHCR images to dev server
        shell: bash
        run: |
          ssh -i ~/.ssh/dev_server_key "${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}" \
            "cd /opt/knotwork && cat > .deploy-images.env <<'EOF'\nBACKEND_IMAGE_TAG=${{ github.sha }}\nFRONTEND_IMAGE_TAG=${{ github.sha }}\nEOF\nDEPLOY_SCOPE=${{ steps.scope.outputs.scope }} bash /opt/knotwork/scripts/deploy_dev_server_images.sh"

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: |
          rm -f ~/.ssh/dev_server_key
