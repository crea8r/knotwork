services:
  bootstrap-frontend:
    image: node:20-alpine
    working_dir: /app/modules/bootstrap/frontend
    command: ["sh", "-lc", "npm --prefix /app/core/app-shell install && ln -sfn /app/core/app-shell/node_modules /app/node_modules && /app/core/app-shell/node_modules/.bin/vite --config /app/modules/bootstrap/frontend/vite.config.ts --host 0.0.0.0 --port 3000"]
    environment:
      VITE_API_URL: "/api/v1"
      BOOTSTRAP_BACKEND_PROXY_URL: "http://host.docker.internal:${BOOTSTRAP_BACKEND_PORT:-8010}"
    ports:
      - "${BOOTSTRAP_FRONTEND_BIND:-0.0.0.0}:${BOOTSTRAP_FRONTEND_PORT:-3010}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../..:/app
    networks:
      - bootstrap

networks:
  bootstrap:
    name: ${BOOTSTRAP_WIZARD_NETWORK:-knotwork-bootstrap-network}
    external: true
