networks:
  # Per-install isolated network. OpenClaw or other sidecars can join this
  # network explicitly by name if they need Docker-network access to Knotwork.
  knotwork-network:
    name: ${KNOTWORK_NETWORK_NAME:-knotwork-local-network}

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: knotwork
      POSTGRES_USER: knotwork
      POSTGRES_PASSWORD: knotwork
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knotwork -d knotwork"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - knotwork-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - knotwork-network

  # ── Backend (API server) ──────────────────────────────────────────────────────
  backend:
    image: ${COMPOSE_PROJECT_NAME:-knotwork}-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      # Docker-internal DB/Redis URLs override .env if set
      DATABASE_URL: postgresql+asyncpg://knotwork:knotwork@postgres:5432/knotwork
      DATABASE_URL_SYNC: postgresql://knotwork:knotwork@postgres:5432/knotwork
      REDIS_URL: redis://redis:6379
      # Explicit override so pydantic-settings reads it from process env, not the
      # baked-in backend/.env which does not contain this key.
      AUTH_DEV_BYPASS_USER_ID: ${AUTH_DEV_BYPASS_USER_ID:-}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python scripts/migrate_or_stamp.py && uvicorn knotwork.main:app --host 0.0.0.0 --port 8000"
    profiles: ["prod"]
    networks:
      knotwork-network:
        aliases:
          - backend
          - knotwork-backend

  # Dev backend: volume mounts for hot reload
  backend-dev:
    image: ${COMPOSE_PROJECT_NAME:-knotwork}-backend-dev:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://knotwork:knotwork@postgres:5432/knotwork
      DATABASE_URL_SYNC: postgresql://knotwork:knotwork@postgres:5432/knotwork
      REDIS_URL: redis://redis:6379
      AUTH_DEV_BYPASS_USER_ID: ${AUTH_DEV_BYPASS_USER_ID:-}
    ports:
      - "${BACKEND_DEV_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python scripts/migrate_or_stamp.py && uvicorn knotwork.main:app --host 0.0.0.0 --port 8000 --reload"
    profiles: ["dev"]
    networks:
      knotwork-network:
        aliases:
          - backend-dev
          - knotwork-backend

  # ── Worker (arq background tasks) ─────────────────────────────────────────────
  worker:
    image: ${COMPOSE_PROJECT_NAME:-knotwork}-worker:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://knotwork:knotwork@postgres:5432/knotwork
      DATABASE_URL_SYNC: postgresql://knotwork:knotwork@postgres:5432/knotwork
      REDIS_URL: redis://redis:6379
      AUTH_DEV_BYPASS_USER_ID: ${AUTH_DEV_BYPASS_USER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: arq knotwork.worker.tasks.WorkerSettings
    profiles: ["prod"]
    networks:
      - knotwork-network

  worker-dev:
    image: ${COMPOSE_PROJECT_NAME:-knotwork}-worker-dev:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://knotwork:knotwork@postgres:5432/knotwork
      DATABASE_URL_SYNC: postgresql://knotwork:knotwork@postgres:5432/knotwork
      REDIS_URL: redis://redis:6379
      AUTH_DEV_BYPASS_USER_ID: ${AUTH_DEV_BYPASS_USER_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-dev:
        condition: service_started
    volumes:
      - ./backend:/app
    command: arq knotwork.worker.tasks.WorkerSettings
    profiles: ["dev"]
    networks:
      - knotwork-network

  # ── Frontend (dev: Vite HMR) ──────────────────────────────────────────────────
  frontend-dev:
    image: ${COMPOSE_PROJECT_NAME:-knotwork}-frontend-dev:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    ports:
      - "${FRONTEND_DEV_HOST_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      # Browser-visible env vars — the browser calls the backend directly,
      # no server-side proxy. Must use the host-mapped port (localhost:8000).
      VITE_API_URL: http://localhost:${BACKEND_DEV_HOST_PORT:-8000}/api/v1
      VITE_DEV_WORKSPACE_ID: ${VITE_DEV_WORKSPACE_ID:-}
    profiles: ["dev"]
    networks:
      - knotwork-network

  # ── Frontend (prod: nginx static) ─────────────────────────────────────────────
  frontend-prod:
    image: ${COMPOSE_PROJECT_NAME:-knotwork}-frontend-prod:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - backend
    profiles: ["prod"]
    networks:
      - knotwork-network

volumes:
  postgres_data:
